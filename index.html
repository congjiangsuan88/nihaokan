<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>你好看 | 每日审美</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: "PingFang SC", sans-serif; display: flex; align-items: center; justify-content: center; }
        
        /* 预览容器 */
        #view-container { position: relative; width: 375px; height: 667px; background: #1a1a1a; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #bg-show { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.8s; }
        .mask { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.7)); z-index: 2; }
        .text-wrap { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 45px; color: #fff; text-align: center; }
        .text-wrap h1 { font-size: 12px; letter-spacing: 8px; margin-bottom: 40px; opacity: 0.5; font-weight: 300; padding-left: 8px; }
        #quote-show { font-size: 20px; line-height: 2.2; font-weight: 300; }

        /* 底部操作 */
        .footer { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 100; }
        .btn { padding: 12px 30px; border: 1px solid rgba(255,255,255,0.3); border-radius: 25px; color: #fff; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); cursor: pointer; font-size: 14px; }

        /* 加载状态 */
        #loading { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; color:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:200; }
        .bar-wrap { width: 120px; height: 2px; background: rgba(255,255,255,0.1); margin-bottom: 15px; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: #f1c40f; transition: width 0.3s; }

        /* 结果海报层 */
        #result-layer { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:300; }
        #result-img { max-width: 80%; max-height: 70%; border-radius: 12px; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .reward-btn { margin-top: 20px; padding: 12px 35px; background: #f1c40f; border: none; border-radius: 25px; font-weight: bold; color: #000; }

        /* 打赏弹窗 */
        #reward-modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:400; }
        .reward-card { background:#fff; padding:30px; border-radius:24px; text-align:center; width:280px; }
        .reward-card img { width: 100%; border-radius: 12px; margin: 15px 0; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="view-container">
        <img id="bg-show" src="">
        <div class="mask"></div>
        <div class="text-wrap">
            <h1>你好看</h1>
            <p id="quote-show">正在遇见美好...</p>
        </div>
    </div>

    <div id="loading">
        <div class="bar-wrap"><div id="bar"></div></div>
        <p id="l-txt" style="font-size:12px; opacity:0.7;">载入中...</p>
    </div>

    <div class="footer">
        <button class="btn" onclick="location.reload()">换一张</button>
        <button class="btn" onclick="drawPoster()" style="background:#fff; color:#000; font-weight: bold; border:none;">保存海报</button>
    </div>

    <div id="result-layer">
        <span style="position:absolute; top:35px; right:35px; color:#fff; font-size:30px;" onclick="this.parentElement.style.display='none'">✕</span>
        <img id="result-img" src="">
        <p style="color:#f1c40f; font-size:13px; margin-top:15px;">长按上方图片保存到相册</p>
        <button class="reward-btn" onclick="showReward()">打赏支持</button>
    </div>

    <div id="reward-modal" onclick="this.style.display='none'">
        <div class="reward-card" onclick="event.stopPropagation()">
            <h3 style="color:#333; font-size:16px;">若这份审美打动了你</h3>
            <img id="reward-qr-img" src="">
            <p style="color:#888; font-size:12px;">长按识别二维码</p>
        </div>
    </div>

        const quoteBox = document.getElementById('quote-show');
        const bgBox = document.getElementById('bg-show');
        const bar = document.getElementById('bar');
        const loading = document.getElementById('loading');
        const rewardImg = document.getElementById('reward-qr-img');

        let currentQuote = "";
        let currentImgObj = null;

        async function init() {
            // 预载打赏码
            if(rewardQrBase64) rewardImg.src = rewardQrBase64;

            try {
                // 1. 抓取文案
                const qRes = await fetch('https://v1.hitokoto.cn/?c=d&c=i');
                const qData = await qRes.json();
                currentQuote = qData.hitokoto;
                quoteBox.innerText = currentQuote;
                bar.style.width = "40%";

                // 2. 抓取图片并转为可绘图对象
                const randomID = Math.floor(Math.random() * 1000);
                const imgRes = await fetch(`https://picsum.photos/1080/1920?random=${randomID}`);
                const blob = await imgRes.blob();
                
                currentImgObj = new Image();
                currentImgObj.src = URL.createObjectURL(blob);
                currentImgObj.onload = () => {
                    bgBox.src = currentImgObj.src;
                    bgBox.style.opacity = 1;
                    bar.style.width = "100%";
                    setTimeout(() => loading.style.display = 'none', 400);
                };
            } catch (e) {
                loading.style.display = 'none';
                quoteBox.innerText = "心之所向，便是阳光。";
            }
        }

        function drawPoster() {
            loading.style.display = 'flex';
            bar.style.width = "30%";
            document.getElementById('l-txt').innerText = "海报冲洗中...";

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 750;   // 2倍高清尺寸
            canvas.height = 1334;

            // A. 绘制背景图
            ctx.drawImage(currentImgObj, 0, 0, 750, 1334);
            
            // B. 绘制渐变遮罩
            const grd = ctx.createLinearGradient(0, 0, 0, 1334);
            grd.addColorStop(0, 'rgba(0,0,0,0.1)');
            grd.addColorStop(1, 'rgba(0,0,0,0.7)');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, 750, 1334);

            // C. 绘制标题
            ctx.fillStyle = "rgba(255,255,255,0.5)";
            ctx.font = "300 24px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("每 日 审 美", 375, 200);

            // D. 绘制名言（自动换行逻辑）
            ctx.fillStyle = "#ffffff";
            ctx.font = "300 40px sans-serif";
            renderWrapText(ctx, currentQuote, 375, 620, 600, 75);

            // E. 生成海报
            bar.style.width = "100%";
            const finalPoster = canvas.toDataURL('image/jpeg', 0.85);
            document.getElementById('result-img').src = finalPoster;
            
            setTimeout(() => {
                document.getElementById('result-layer').style.display = 'flex';
                loading.style.display = 'none';
            }, 500);
        }

        function renderWrapText(context, text, x, y, maxWidth, lineHeight) {
            const chars = text.split('');
            let line = '';
            let currentY = y;

            for (let i = 0; i < chars.length; i++) {
                let testLine = line + chars[i];
                let metrics = context.measureText(testLine);
                if (metrics.width > maxWidth && i > 0) {
                    context.fillText(line, x, currentY);
                    line = chars[i];
                    currentY += lineHeight;
                } else {
                    line = testLine;
                }
            }
            context.fillText(line, x, currentY);
        }

        function showReward() {
            if(!rewardQrBase64) {
                alert("作者暂未开启打赏~");
                return;
            }
            document.getElementById('reward-modal').style.display = 'flex';
        }

        window.onload = init;
    </script>
