<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>你好看 | 每日审美 - 治愈系名句壁纸生成器</title>
    
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; display: flex; align-items: center; justify-content: center; }

        /* --- 核心优化：锁定海报逻辑尺寸 (375x667 为标准 9:16) --- */
        #poster-container { 
            position: relative; 
            width: 375px; 
            height: 667px; 
            overflow: hidden; 
            transition: filter 0.5s ease; 
            background: #000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            /* 在桌面端如果高度不够，自动缩小显示 */
            transform-origin: center center;
        }

        /* 电脑端视觉缩放适配：防止容器超出屏幕 */
        @media screen and (max-height: 700px) {
            #poster-container { transform: scale(0.85); }
        }
        @media screen and (max-height: 600px) {
            #poster-container { transform: scale(0.7); }
        }

        .is-loading #poster-container { filter: blur(15px); }

        .bg-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #bg-image { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 1.5s ease; opacity: 0; }
        .bg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); z-index: 2; }
        
        .content { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; text-align: center; padding: 30px; }
        .content h1 { font-size: 1rem; letter-spacing: 1.2rem; margin-bottom: 50px; text-shadow: 0 2px 20px rgba(0,0,0,0.5); font-weight: 300; opacity: 0.6; padding-left: 1.2rem; }
        #quote { font-size: 1.25rem; line-height: 2; max-width: 85%; text-shadow: 0 2px 20px rgba(0,0,0,0.8); font-weight: 300; }

        .qr-area { position: absolute; bottom: 30px; right: 30px; z-index: 15; text-align: center; display: none; }
        .qr-area img { width: 60px; height: 60px; border-radius: 4px; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.3); }
        .qr-area p { color: rgba(255,255,255,0.5); font-size: 10px; }

        .footer { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 50; transition: opacity 0.5s ease; }
        .is-loading .footer { opacity: 0; pointer-events: none; }
        
        .btn { padding: 10px 25px; border: 1px solid rgba(255,255,255,0.4); border-radius: 25px; color: #fff; text-decoration: none; font-size: 0.85rem; backdrop-filter: blur(8px); background: rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .btn:active { background: rgba(255,255,255,0.3); }

        /* --- 艺术感加载进度条 --- */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            color: #fff; display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 150; transition: opacity 0.5s ease;
        }
        
        .progress-container { width: 200px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #f1c40f, #e67e22); transition: width 0.3s ease; box-shadow: 0 0 10px rgba(230, 126, 34, 0.5); }
        .loading-tip { font-size: 0.9rem; font-weight: 300; color: rgba(255,255,255,0.8); letter-spacing: 2px; animation: breathe 2s infinite ease-in-out; }

        /* 预览层 */
        #preview-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #preview-img { max-width: 85%; max-height: 70%; border-radius: 10px; box-shadow: 0 0 40px rgba(0,0,0,1); margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .preview-tip { color: #f1c40f; font-size: 0.85rem; margin-bottom: 25px; animation: breathe 2s infinite; }
        .reward-btn { padding: 12px 40px; background: linear-gradient(135deg, #f1c40f, #e67e22); border: none; color: #fff; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .close-preview { position: absolute; top: 40px; right: 25px; color: #fff; font-size: 1.8rem; padding: 10px; opacity: 0.6; }

        /* 打赏弹窗 */
        #reward-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 300; display: none; justify-content: center; align-items: center; }
        .reward-card { background: #fff; width: 280px; padding: 30px; border-radius: 24px; text-align: center; position: relative; }
        .reward-card h3 { color: #333; margin-bottom: 10px; font-size: 1.1rem; }
        .reward-card img { width: 100%; border-radius: 12px; margin-bottom: 15px; border: 1px solid #f0f0f0; }
        .reward-card p { color: #666; font-size: 0.8rem; }
        .close-reward { position: absolute; top: 15px; right: 15px; color: #ccc; font-size: 1.2rem; cursor: pointer; }

        @keyframes breathe { 
            0%, 100% { opacity: 0.4; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

    <div class="footer">

    <div id="loading-overlay">

    </div>

    <div id="preview-layer">
        <div class="close-preview" onclick="this.parentElement.style.display='none'">✕</div>

        <button class="reward-btn" onclick="document.getElementById('reward-modal').style.display='flex'">打赏支持作者</button>
    </div>

        </div>

        const quoteElement = document.getElementById('quote');
        const bgImageElement = document.getElementById('bg-image');
        const loadingOverlay = document.getElementById('loading-overlay');
        const progressBar = document.getElementById('progress-bar');
        const qrArea = document.getElementById('qr-area');

        function updateProgress(value) {
            if (progressBar) progressBar.style.width = `${value}%`;
        }

        async function initPage() {
            loadingOverlay.style.display = 'flex';
            document.body.classList.add('is-loading');
            updateProgress(10);

            // 填充打赏码
            document.getElementById('reward-qr-img').src = rewardQrBase64;

            // 1. 获取文案
            try {
                const res = await fetch('https://v1.hitokoto.cn/?c=d&c=i');
                const data = await res.json();
                quoteElement.innerText = data.hitokoto;
                updateProgress(40);
            } catch (e) {
                quoteElement.innerText = "万物可爱，人间值得。";
            }

            // 2. 获取并锁死图片
            try {
                const randomID = Math.floor(Math.random() * 1000);
                const imgRes = await fetch(`https://picsum.photos/1080/1920?random=${randomID}`);
                updateProgress(70);
                const blob = await imgRes.blob();
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    bgImageElement.src = reader.result;
                    bgImageElement.style.opacity = '1';
                    updateProgress(100);
                    
                    setTimeout(() => {
                        loadingOverlay.style.opacity = '0';
                        setTimeout(() => {
                            loadingOverlay.style.display = 'none';
                            document.body.classList.remove('is-loading');
                        }, 500);
                    }, 400);
                };
            } catch (e) {
                loadingOverlay.style.display = 'none';
                document.body.classList.remove('is-loading');
            }
        }

        async function generatePoster() {
            const previewLayer = document.getElementById('preview-layer');
            const previewImg = document.getElementById('preview-img');
            
            // 截图预备态
            loadingOverlay.style.display = 'flex';
            document.querySelector('.progress-container').style.display = 'none';
            document.querySelector('.loading-tip').innerText = "海报制作中...";
            qrArea.style.display = 'block';

            try {
                const container = document.getElementById('poster-container');
                const canvas = await html2canvas(container, {
                    useCORS: true,
                    scale: 3,           // 3倍高清
                    width: 375,         // 强制截图宽度
                    height: 667,        // 强制截图高度
                    windowWidth: 375,   // 模拟窗口尺寸
                    windowHeight: 667,
                    x: 0, y: 0,
                    backgroundColor: '#000'
                });

                previewImg.src = canvas.toDataURL('image/jpeg', 0.9);
                previewLayer.style.display = 'flex';
            } catch (err) {
                alert("生成失败，请刷新重试");
            } finally {
                qrArea.style.display = 'none';
                loadingOverlay.style.display = 'none';
                document.querySelector('.progress-container').style.display = 'block';
                document.querySelector('.loading-tip').innerText = "正在为你寻找美好的遇见...";
            }
        }

        window.onload = initPage;
    </script>
