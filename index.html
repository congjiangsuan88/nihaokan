<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>你好看 | 每日审美 - 治愈系名句壁纸生成器</title>
    
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }

        #poster-container { position: relative; width: 100%; height: 100%; overflow: hidden; transition: filter 0.5s ease; }
        /* 加载时给容器加上模糊效果 */
        .is-loading #poster-container { filter: blur(10px); }

        .bg-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #bg-image { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 1.5s ease; opacity: 0; }
        .bg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); z-index: 2; }
        
        .content { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; text-align: center; padding: 30px; }
        .content h1 { font-size: 1rem; letter-spacing: 1.2rem; margin-bottom: 50px; text-shadow: 0 2px 20px rgba(0,0,0,0.5); font-weight: 300; opacity: 0.6; padding-left: 1.2rem; }
        #quote { font-size: 1.25rem; line-height: 2; max-width: 85%; text-shadow: 0 2px 20px rgba(0,0,0,0.8); font-weight: 300; }

        .qr-area { position: absolute; bottom: 30px; right: 30px; z-index: 15; text-align: center; display: none; }
        .qr-area img { width: 60px; height: 60px; border-radius: 4px; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.3); }
        .qr-area p { color: rgba(255,255,255,0.5); font-size: 10px; }

        .footer { position: absolute; bottom: calc(40px + env(safe-area-inset-bottom)); width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 20; transition: opacity 0.5s ease; }
        .is-loading .footer { opacity: 0; pointer-events: none; } /* 加载时隐藏按钮 */
        
        .btn { padding: 10px 25px; border: 1px solid rgba(255,255,255,0.4); border-radius: 25px; color: #fff; text-decoration: none; font-size: 0.85rem; backdrop-filter: blur(8px); background: rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }

        /* --- 艺术感加载进度条重构 --- */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); /* 调深黑背景 */
            color: #fff; display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 150; transition: opacity 0.5s ease;
        }
        
        /* 1. 进度条容器 */
        .progress-container {
            width: 200px; height: 3px; /* 极细极简 */
            background: rgba(255,255,255,0.1);
            border-radius: 3px; overflow: hidden;
            margin-bottom: 20px; position: relative;
        }
        
        /* 2. 进度条本体：极光渐变 */
        .progress-bar {
            height: 100%; width: 0%; /* 初始宽度 0% */
            background: linear-gradient(90deg, #f1c40f, #e67e22); /* 金色到暖橙渐变 */
            border-radius: 3px; transition: width 0.3s ease; /* 关键平滑过渡 */
            box-shadow: 0 0 10px rgba(230, 126, 34, 0.5); /* 淡淡光晕 */
        }
        
        /* 3. 呼吸感提示文字 */
        .loading-tip {
            font-size: 0.9rem; font-weight: 300; color: rgba(255,255,255,0.8);
            letter-spacing: 2px;
            animation: breathe 2s infinite ease-in-out; /* 呼吸动效 */
        }

        /* 原有预览和打赏层样式保持不变... */
        #preview-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 20px; }
        #preview-img { max-width: 80%; max-height: 65%; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.5); margin-bottom: 15px; }
        .preview-tip { color: #fff; font-size: 0.85rem; opacity: 0.7; margin-bottom: 25px; }
        .reward-btn { padding: 12px 40px; background: linear-gradient(135deg, #f1c40f, #e67e22); border: none; color: #fff; border-radius: 25px; font-weight: bold; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4); cursor: pointer; }
        .close-preview { position: absolute; top: 40px; right: 20px; color: #fff; font-size: 1.5rem; padding: 10px; }
        #reward-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 200; display: none; justify-content: center; align-items: center; }
        .reward-card { background: #fff; width: 280px; padding: 30px; border-radius: 20px; text-align: center; position: relative; }
        .reward-card h3 { color: #333; margin-bottom: 15px; font-size: 1.1rem; }
        .reward-card img { width: 180px; height: 180px; margin-bottom: 15px; }
        .reward-card p { color: #888; font-size: 0.8rem; }
        .close-reward { position: absolute; top: 10px; right: 15px; color: #ccc; font-size: 1.2rem; cursor: pointer; }

        /* --- 定义核心动画 --- */
        @keyframes breathe { /* 呼吸动画 */
            0%, 100% { opacity: 0.5; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="poster-container">
        <div class="bg-container"><img id="bg-image" src="" alt="背景"><div class="bg-overlay"></div></div>
        <div class="content"><h1 id="title">你好看</h1><p id="quote">万物可爱，人间值得。</p></div>
        <div class="qr-area" id="qr-area">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://nihaokan.com" alt="QR">
            <p>长按识码预览</p>
        </div>
    </div>

    <div class="footer">
        <a href="javascript:location.reload()" class="btn">换一张</a>
        <button class="btn" onclick="generatePoster()">保存海报</button>
    </div>

    <div id="preview-layer">
        <div class="close-preview" onclick="this.parentElement.style.display='none'">✕</div>
        <img id="preview-img" src="" alt="预览图">
        <p class="preview-tip">—— 长按图片保存到相册 ——</p>
        <button class="reward-btn" onclick="showReward()">打赏支持作者</button>
    </div>

    <div id="reward-modal">
        <div class="reward-card">
            <span class="close-reward" onclick="document.getElementById('reward-modal').style.display='none'">✕</span>
            <h3>若这份审美打动了你</h3>
            <p style="font-size: 0.9rem; color: #666; margin-bottom: 15px;">不妨请作者喝杯咖啡 ☕️</p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=WECHAT_PAY_URL" alt="收款码">
            <p>长按或扫码支持</p>
        </div>
    </div>

    <div id="loading-overlay">
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <p class="loading-tip">正在为你寻找美好的遇见...</p>
    </div>

    <script>
        const quoteElement = document.getElementById('quote');
        const bgImageElement = document.getElementById('bg-image');
        const qrArea = document.getElementById('qr-area');
        const loadingElement = document.getElementById('loading-overlay');
        const progressBar = document.getElementById('progress-bar');
        const previewLayer = document.getElementById('preview-layer');
        const previewImg = document.getElementById('preview-img');
        const rewardModal = document.getElementById('reward-modal');

        // 更新进度条数值的函数
        function updateProgress(value) {
            if (progressBar && loadingElement.style.display === 'flex') {
                progressBar.style.width = `${value}%`;
            }
        }

        async function initPage() {
            // 0. 显示加载层，加入模糊
            loadingElement.style.display = 'flex';
            document.body.classList.add('is-loading');
            updateProgress(10); // 初始进度

            // 1. 获取文案
            try {
                const response = await fetch('https://v1.hitokoto.cn/?c=d&c=i');
                const data = await response.json();
                updateProgress(30); // 拿到文案，更新进度
                quoteElement.innerText = data.hitokoto;
            } catch (error) { 
                quoteElement.innerText = "万物可爱，人间值得。"; 
            }

            // 2. 随机图片地址
            const randomID = Math.floor(Math.random() * 1000);
            const rawUrl = `https://picsum.photos/1080/1920?random=${randomID}`;
            
            // 3. 【核心逻辑】使用 Base64 物理锁死图片数据
            try {
                updateProgress(40); // 开始图片传输
                const imgRes = await fetch(rawUrl);
                updateProgress(70); // 拿到二进制流
                const blob = await imgRes.blob();
                const reader = new FileReader();
                reader.readAsDataURL(blob); 
                reader.onloadend = () => { 
                    updateProgress(100); // 转换完成
                    bgImageElement.src = reader.result; 
                    
                    // 延迟 0.5s 移除加载层，展示优雅过渡
                    setTimeout(() => {
                        bgImageElement.style.opacity = '1'; 
                        loadingElement.style.opacity = '0';
                        setTimeout(() => {
                            loadingElement.style.display = 'none';
                            document.body.classList.remove('is-loading'); // 移除模糊
                            loadingElement.style.opacity = '1'; // 还原透明度以便下次使用
                        }, 500);
                    }, 500);
                };
            } catch (e) { 
                // 兜底方案
                bgImageElement.crossOrigin = "Anonymous"; 
                bgImageElement.src = rawUrl; 
                setTimeout(() => { loadingElement.style.display = 'none'; document.body.classList.remove('is-loading'); }, 1000);
            }
        }

        async function generatePoster() {
            // 截图时的加载不用太复杂，保持简洁即可
            const loadingOverlay = document.getElementById('loading-overlay');
            const progressContainer = document.querySelector('.progress-container');
            const tip = document.querySelector('.loading-tip');
            
            loadingOverlay.style.display = 'flex'; 
            progressContainer.style.display = 'none'; // 截图时隐藏具体进度条
            tip.innerText = "海报制作中...";
            qrArea.style.display = 'block'; 

            try {
                const container = document.getElementById('poster-container');
                const canvas = await html2canvas(container, { useCORS: true, scale: 3, backgroundColor: '#000' });
                previewImg.src = canvas.toDataURL('image/jpeg', 0.9); 
                previewLayer.style.display = 'flex';
            } catch (error) { alert("生成失败，请重试。"); } 
            finally { 
                qrArea.style.display = 'none'; 
                loadingOverlay.style.display = 'none'; 
                progressContainer.style.display = 'block'; // 还原以便下次初始化使用
                tip.innerText = "正在为你寻找美好的遇见...";
            }
        }

        function showReward() { rewardModal.style.display = 'flex'; }
        window.addEventListener('DOMContentLoaded', initPage);
