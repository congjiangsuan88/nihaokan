<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>你好看 | 每日审美</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: "PingFang SC", sans-serif; display: flex; align-items: center; justify-content: center; }
        
        #poster-container { 
            position: relative; width: 375px; height: 667px; 
            overflow: hidden; background: #1a1a1a; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            transform-origin: center center;
        }

        @media screen and (max-height: 750px) { #poster-container { transform: scale(0.9); } }
        @media screen and (max-height: 650px) { #poster-container { transform: scale(0.8); } }

        .bg-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #bg-image { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity 1.2s; }
        .bg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%); z-index: 2; }
        
        .content { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; text-align: center; padding: 45px; }
        .content h1 { font-size: 0.75rem; letter-spacing: 0.8rem; margin-bottom: 50px; opacity: 0.5; font-weight: 300; padding-left: 0.8rem; }
        #quote { font-size: 1.3rem; line-height: 2.2; font-weight: 300; opacity: 0; transform: translateY(10px); transition: all 1s; }
        #quote.show { opacity: 1; transform: translateY(0); }

        .qr-area { position: absolute; bottom: 35px; right: 35px; z-index: 15; text-align: center; display: none; }
        .qr-area img { width: 52px; height: 52px; border-radius: 4px; margin-bottom: 6px; }
        .qr-area p { color: rgba(255,255,255,0.4); font-size: 8px; }

        .footer { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 50; }
        .btn { padding: 12px 30px; border: 1px solid rgba(255,255,255,0.25); border-radius: 25px; color: #fff; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); cursor: pointer; font-size: 14px; }

        /* --- 进度条样式回归 --- */
        #loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,1); color:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:100; transition: opacity 0.5s; }
        .progress-box { width: 180px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-bottom: 20px; }
        #progress-bar { width: 0%; height: 100%; background: #f1c40f; transition: width 0.3s; }
        .loading-text { font-size: 12px; letter-spacing: 2px; opacity: 0.8; }

        #preview-layer { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:200; }
        #preview-img { max-width: 80%; max-height: 70%; border-radius: 12px; margin-bottom: 20px; }
        .reward-btn { padding: 12px 35px; background: #f1c40f; border: none; color: #000; border-radius: 25px; font-weight: bold; cursor: pointer; }

        #reward-modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:300; }
        .reward-card { background:#fff; padding:30px; border-radius:24px; text-align:center; width:280px; }
    </style>
</head>
<body>

    <div id="poster-container">
        <div class="bg-container"><img id="bg-image" src="" alt="背景"><div class="bg-overlay"></div></div>
        <div class="content"><h1>每日审美</h1><p id="quote">正在加载...</p></div>
        <div class="qr-area" id="qr-area">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://mei.nihaokan.com" alt="QR">
            <p>长按识码体验</p>
        </div>
    </div>

    <div id="loading-overlay">
        <div class="progress-box"><div id="progress-bar"></div></div>
        <div class="loading-text" id="loading-text">正在寻找光...</div>
    </div>

    <div class="footer">
        <button class="btn" onclick="location.reload()">换一张</button>
        <button class="btn" onclick="generatePoster()" style="background:#fff; color:#000; font-weight: bold; border:none;">保存海报</button>
    </div>

    <div id="preview-layer">
        <span style="position:absolute; top:35px; right:35px; color:#fff; font-size:30px;" onclick="document.getElementById('preview-layer').style.display='none'">✕</span>
        <img id="preview-img" src="">
        <p style="color:#f1c40f; font-size:14px; margin-bottom:15px;">长按图片保存到相册</p>
        <button class="reward-btn" onclick="document.getElementById('reward-modal').style.display='flex'">打赏作者支持</button>
    </div>

    <div id="reward-modal" onclick="this.style.display='none'">
        <div class="reward-card" onclick="event.stopPropagation()">
            <h3 style="color:#333;">若这份审美打动了你</h3>
            <img id="reward-qr-img" src="" alt="收款码">
            <p style="color:#888; font-size:12px;">长按支持作者喝杯咖啡 ☕️</p>
        </div>
    </div>

        const bar = document.getElementById('progress-bar');
        const lText = document.getElementById('loading-text');
        const lOverlay = document.getElementById('loading-overlay');
        const quoteElement = document.getElementById('quote');
        const bgImageElement = document.getElementById('bg-image');
        const qrArea = document.getElementById('qr-area');
        const previewImg = document.getElementById('preview-img');

        function setProgress(p, text) {
            bar.style.width = p + '%';
            if(text) lText.innerText = text;
        }

        async function init() {
            if(rewardQrBase64) document.getElementById('reward-qr-img').src = rewardQrBase64;
            setProgress(20, "正在寻找光...");
            
            try {
                const quotePromise = fetch('https://v1.hitokoto.cn/?c=d&c=i').then(r => r.json());
                const randomID = Math.floor(Math.random() * 1000);
                const imgPromise = fetch(`https://picsum.photos/1080/1920?random=${randomID}`).then(r => r.blob());

                const qData = await quotePromise;
                setProgress(60, "捕捉灵感中...");
                
                const imgBlob = await imgPromise;
                setProgress(90, "即将呈现...");

                quoteElement.innerText = qData.hitokoto;
                quoteElement.classList.add('show');

                const objectURL = URL.createObjectURL(imgBlob);
                bgImageElement.src = objectURL;
                bgImageElement.onload = () => { 
                    bgImageElement.style.opacity = '1';
                    setProgress(100);
                    setTimeout(() => { lOverlay.style.opacity = '0'; setTimeout(()=>lOverlay.style.display='none', 500); }, 300);
                };
            } catch (e) {
                lOverlay.style.display = 'none';
                quoteElement.innerText = "万物可爱，人间值得。";
                quoteElement.classList.add('show');
            }
        }

        async function generatePoster() {
            lOverlay.style.display = 'flex';
            lOverlay.style.opacity = '1';
            setProgress(30, "正在雕琢...");
            qrArea.style.display = 'block'; 

            const container = document.getElementById('poster-container');
            const originalStyle = container.style.cssText;
            container.style.position = 'fixed';
            container.style.top = '0'; container.style.left = '0';
            container.style.transform = 'none'; container.style.zIndex = '10000';

            try {
                const canvas = await html2canvas(container, {
                    useCORS: true, scale: 3, width: 375, height: 667,
                    windowWidth: 375, windowHeight: 667, x: 0, y: 0
                });
                setProgress(100, "制作完成");
                previewImg.src = canvas.toDataURL('image/jpeg', 0.85);
                setTimeout(() => {
                    document.getElementById('preview-layer').style.display = 'flex';
                    lOverlay.style.display = 'none';
                }, 400);
            } catch (err) {
                alert("生成失败");
                lOverlay.style.display = 'none';
            } finally {
                container.style.cssText = originalStyle;
                qrArea.style.display = 'none'; 
            }
        }

        window.onload = init;
    </script>
